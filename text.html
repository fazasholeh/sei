<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Futuristic Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(188, 19, 254, 0.15) 0%, transparent 40%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Dekorasi Lingkaran Neon */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 30px;
            color: var(--neon-purple);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
        }

        /* Hover Effects */
        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Warna spesifik untuk setiap tombol */
        .whatsapp:hover { border-color: #25D366; box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }
        .telegram:hover { border-color: #0088cc; box-shadow: 0 0 15px rgba(0, 136, 204, 0.4); }
        .instagram:hover { border-color: #e4405f; box-shadow: 0 0 15px rgba(228, 64, 95, 0.4); }
        .tiktok:hover { border-color: #ff0050; box-shadow: 0 0 15px rgba(255, 0, 80, 0.4); }

        .btn i {
            font-size: 1.2rem;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://img2.pixhost.to/images/7703/723063479_alip-1778077954379.jpg" alt="Profile" class="profile-img">
        
        <h1>ZASEIER</h1>
        <p>Digital Creator | Tech Enthusiast</p>

        <div class="links-container">
            <a href="https://wa.me/6285835445952" class="btn whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>

            <a href="https://t.me/theseier" class="btn telegram" target="_blank">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>

            <a href="https://instagram.com/zaseier" class="btn instagram" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://tiktok.com/@zaseier" class="btn tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
            © 2026 ZASEIER CORE. ALL RIGHTS RESERVED.
        </div>
    </div>

</body>
</html>
